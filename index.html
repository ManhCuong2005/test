<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Trang trí</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        padding: 24px;
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(circle at 15% 20%, #ff8fab 0, transparent 35%),
          radial-gradient(circle at 85% 25%, #8e7dff 0, transparent 38%),
          radial-gradient(circle at 50% 90%, #41c7ff 0, transparent 40%),
          linear-gradient(135deg, #14152d, #271744 55%, #151f3d);
        color: white;
      }

      .background-blur {
        position: absolute;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.45;
        animation: moveBlur 8s ease-in-out infinite alternate;
      }

      .blur-one {
        top: -120px;
        left: -100px;
        background: #ff3f81;
      }

      .blur-two {
        right: -120px;
        bottom: -100px;
        background: #6c63ff;
        animation-delay: 1.5s;
      }

      .container {
        position: relative;
        z-index: 1;
        width: min(920px, 100%);
        padding: 50px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.1);
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        text-align: center;
        animation: appear 0.9s ease-out;
      }

      .small-title {
        margin-bottom: 16px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      .title-list {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .title {
        position: relative;
        overflow: hidden;
        padding: 22px 30px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          rgba(255, 255, 255, 0.06)
        );
        box-shadow:
          0 14px 35px rgba(0, 0, 0, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        font-size: clamp(30px, 6vw, 62px);
        font-weight: 900;
        letter-spacing: -2px;
        text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.3s ease,
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      .title::before {
        content: "";
        position: absolute;
        top: 0;
        left: -120%;
        width: 60%;
        height: 100%;
        transform: skewX(-20deg);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        animation: shine 4s infinite;
      }

      .title:hover {
        transform: translateY(-5px) scale(1.015);
        border-color: rgba(255, 255, 255, 0.35);
        box-shadow:
          0 20px 45px rgba(0, 0, 0, 0.35),
          0 0 30px rgba(170, 120, 255, 0.2);
      }

      .highlight {
        margin-top: 14px;
        border-color: rgba(255, 226, 92, 0.38);
        background: linear-gradient(
          135deg,
          rgba(255, 221, 87, 0.22),
          rgba(255, 120, 150, 0.14)
        );
        color: #fff08a;
        text-shadow:
          0 0 15px rgba(255, 229, 92, 0.45),
          0 8px 30px rgba(0, 0, 0, 0.4);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 28px 0;
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.35),
          transparent
        );
      }

      @keyframes appear {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.96);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes shine {
        0% {
          left: -120%;
        }

        45%,
        100% {
          left: 150%;
        }
      }

      @keyframes moveBlur {
        from {
          transform: translate(0, 0) scale(1);
        }

        to {
          transform: translate(70px, 45px) scale(1.2);
        }
      }

      @media (max-width: 600px) {
        body {
          padding: 16px;
        }

        .container {
          padding: 30px 18px;
          border-radius: 24px;
        }

        .title {
          padding: 18px 12px;
          border-radius: 16px;
          letter-spacing: -1px;
        }

        .small-title {
          font-size: 10px;
          letter-spacing: 4px;
        }

        .divider {
          margin: 20px 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="background-blur blur-one"></div>
    <div class="background-blur blur-two"></div>

    <main class="container">
      <p class="small-title">Bảng xếp hạng đặc biệt</p>

      <section class="title-list">
        <h1 class="title">Chịu bà Ki ngu</h1>
        <h1 class="title">Chịu bà Tí ngu</h1>
      </section>

      <div class="divider">Nhân vật cuối cùng</div>

      <h1 class="title highlight">Và bà Bôn ngu</h1>
    </main>
  </body>
</html>
